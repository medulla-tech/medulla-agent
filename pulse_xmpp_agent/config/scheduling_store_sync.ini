# Configuration for Medulla Store package sync plugin
# This plugin periodically fetches packages from the Kestra API

[store_sync]
# Enable/disable automatic sync (0 = disabled, 1 = enabled)
enabled = 0

# Kestra packages API URL (the nginx endpoint)
# Example: http://kestra.example.com:8081
api_url =

# API authentication token (unique per server)
api_token =

# Local packages directory
packages_path = /var/lib/pulse2/packages/sharing/global

# Script to regenerate package database
generate_script = /usr/sbin/pulse2-generation_package.py

# Skip SSL certificate verification (1 for self-signed certificates)
skip_ssl_verify = 0
