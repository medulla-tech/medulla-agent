[security_scan]
# Enable or disable scheduled security scans
# Set to 1 to enable, 0 to disable
enabled = 1

# Optional: Filter scan by entity ID
# Leave empty or comment out for global scan (all machines)
# entity_id =

# Optional: Filter scan by group ID (Dyngroup)
# Leave empty or comment out for global scan (all machines)
# group_id =

# Note: The scan schedule is configured in the plugin itself (default: 4:00 AM daily)
# To change the schedule, modify SCHEDULE in scheduling_security_scan.py
# or override it in manage_scheduler_relay.ini
